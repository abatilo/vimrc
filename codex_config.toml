model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
plan_mode_reasoning_effort = "xhigh"
model_context_window = 1000000
model_verbosity = "high"
file_opener = "none"
show_raw_agent_reasoning = true
sandbox_mode = "danger-full-access"
approval_policy = "never"
notify = ["codex-wakatime"]
# model_instructions_file = "/Users/abatilo/abatilo/vimrc/codex_mcp_instructions.md"
personality = "pragmatic"
web_search = "live"
service_tier = "fast"

[features]
goal = true
terminal_resize_reflow = true
memories = true
prevent_idle_sleep = true
goals = true

[agents]
max_threads = 20

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"

[mcp_servers.chrome]
command = "npx"
args = ["chrome-devtools-mcp@latest", "--auto-connect"]

[mcp_servers.grafana]
command = "docker"
args = ["run", "--rm", "-i", "-e", "GRAFANA_URL", "-e", "GRAFANA_SERVICE_ACCOUNT_TOKEN", "grafana/mcp-grafana", "-t", "stdio"]
env_vars = ["GRAFANA_URL", "GRAFANA_SERVICE_ACCOUNT_TOKEN"]

[tui]
vim_mode_default = true

[tui.model_availability_nux]
"gpt-5.5" = 4

